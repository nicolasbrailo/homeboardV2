<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="batman">
    <allow own="io.homeboard.PhotoProvider"/>
    <allow send_destination="io.homeboard.PhotoProvider"/>
  </policy>
  <policy context="default">
    <allow send_destination="io.homeboard.PhotoProvider"/>
    <allow receive_sender="io.homeboard.PhotoProvider"/>
  </policy>
</busconfig>
